<!DOCTYPE html>
<html>
<head>
  <title>Little Keeps</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page">
    <section class="card">
      <h1>Little Keeps ♡</h1>
      <p class="tagline">Personalised gifts made just for you.</p>

      <h2>🌸 Name Keychain Customiser</h2>

      <label>Enter name</label>
      <input id="nameInput" type="text" maxlength="10" placeholder="e.g. Kaylee">

      <h3>Choose base colour</h3>
      <div id="baseColours" class="colour-row"></div>

      <h3>Choose tile colour</h3>
      <div id="tileColours" class="colour-row"></div>

      <h3>Choose letter colour</h3>
      <div id="letterColours" class="colour-row"></div>

      <h3>Preview</h3>
      <div class="keychain">
        <div class="hole"></div>
        <div id="previewName" class="letters"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
